  .title-text { color: #FFD700; font-size: 16px; font-weight: bold; text-shadow: 0 0 10px rgba(255,215,0,0.5); }

  /* Main card area */
  .card-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }

  /* Sentence progress dots */
  .word-dots { display: flex; gap: 8px; margin-bottom: 8px; }

  .word-dot.done { background: #FFD700; border-color: #FFD700; box-shadow: 0 0 8px rgba(255,215,0,0.8); }
  .word-dot.current { background: #E8C4F0; border-color: #C084FC; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

  /* Flip card */
  .flip-card-wrapper { perspective: 1000px; width: min(340px, 90vw); height: min(260px, 50vw); cursor: pointer; }
  .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
  .flip-card-wrapper.flipped .flip-card-inner { transform: rotateY(180deg); }
  .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .flip-card-front { background: linear-gradient(135deg, #3d0f6b, #6b21a8); border: 3px solid rgba(255,215,0,0.6); box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2); }
  .flip-card-back { background: linear-gradient(135deg, #1e3a5f, #1e40af); border: 3px solid rgba(96,165,250,0.6); box-shadow: 0 8px 32px rgba(0,0,0,0.4); transform: rotateY(180deg); }

  .tap-hint { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 8px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

  /* Word display */
  .word-display { display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; padding: 0 10px; }
  .letter { font-size: clamp(40px, 12vw, 72px); font-weight: bold; line-height: 1; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .letter.vowel { color: #FF85C2; }
  .letter.consonant { color: #93C5FD; }
  .letter.silent { color: #9CA3AF; }
  .letter.digraph { color: #FCD34D; }
  .letter.punct { color: #E8C4F0; }

  /* Picture hint */

  .hint-emoji { font-size: clamp(60px, 18vw, 100px); line-height: 1; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
  .hint-word { color: white; font-size: 20px; font-weight: bold; opacity: 0.9; }

  .celebration-title { color: #FFD700; font-size: 28px; font-weight: bold; margin: 12px 0 8px; text-shadow: 0 0 20px rgba(255,215,0,0.8); }
  .celebration-subtitle { color: #E8C4F0; font-size: 16px; }

  .confetti-piece { position: absolute; width: 10px; height: 10px; animation: confettiFall linear forwards; }

  /* End screen */

// ── PHONETIC COLORING ─────────────────────────────────────────────────────────
const VOWELS = new Set(['a','e','i','o','u','A','E','I','O','U']);
const DIGRAPHS = ['ch','sh','th','wh','ph','ck','ng','qu','bl','br','cl','cr','dr','fl','fr','gl','gr','pl','pr','sc','sk','sl','sm','sn','sp','st','sw','tr','tw'];
const SILENT_RULES = {
  'e': (word, i) => i === word.length - 1 && i > 1,
  'k': (word, i) => i === 0 && word[1] && word[1].toLowerCase() === 'n',
  'w': (word, i) => i === 0 && word[1] && word[1].toLowerCase() === 'r',
  'b': (word, i) => i === word.length - 1 && word[i-1] && word[i-1].toLowerCase() === 'm',
  'g': (word, i) => word[i-1] && word[i-1].toLowerCase() === 'n',
};

function classifyLetters(word) {
  const clean = word.replace(/[^a-zA-Z]/g, '');
  const result = [];
  let i = 0;
  const lc = clean.toLowerCase();
  while (i < clean.length) {
    const ch = clean[i];
    const punct = /[^a-zA-Z]/.test(ch);
    if (punct) { result.push({ ch, type: 'punct' }); i++; continue; }
    // check digraph
    if (i + 1 < clean.length) {
      const di = lc[i] + lc[i+1];
      if (DIGRAPHS.includes(di)) {
        result.push({ ch: clean[i] + clean[i+1], type: 'digraph' });
        i += 2; continue;
      }
    }
    // check silent
    const rule = SILENT_RULES[lc[i]];
    if (rule && rule(lc, i)) { result.push({ ch, type: 'silent' }); i++; continue; }
    if (VOWELS.has(ch)) { result.push({ ch, type: 'vowel' }); }
    else { result.push({ ch, type: 'consonant' }); }
    i++;
  }
  // append punctuation that was part of original word
  const trailPunct = word.slice(clean.length);
  for (const p of trailPunct) result.push({ ch: p, type: 'punct' });
  return result;
}

function ColoredWord({ word, big = true }) {

}

    size: 1 + Math.random() * 3,
    delay: Math.random() * 3,
  }));
  return React.createElement('div', { className: 'stars' },
    stars.map(s => React.createElement('div', {
      key: s.id,
      className: 'star-dot',
      style: { top: s.top + '%', left: s.left + '%', width: s.size, height: s.size, animationDelay: s.delay + 's' }
    }))
  );
}

// ── GUIDES ────────────────────────────────────────────────────────────────────
const GUIDES = ['🦄', '👸', '🌟', '🦋', '🌸'];

// ── MAIN GAME ─────────────────────────────────────────────────────────────────
function Game() {
  const [sentenceIdx, setSentenceIdx] = useState(0);
  const [wordIdx, setWordIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [phase, setPhase] = useState('word'); // 'word' | 'fullSentence' | 'celebration' | 'end'
  const [stars, setStars] = useState(0);
  const [celebration, setCelebration] = useState(null);
  const [guideIdx] = useState(() => Math.floor(Math.random() * GUIDES.length));
  const celebTimerRef = useRef(null);

  const sentence = SENTENCES[sentenceIdx];

  const handleFlip = useCallback(() => {
    if (phase === 'word') setFlipped(f => !f);
  }, [phase]);

  const handleYes = useCallback(() => {
    if (phase === 'word') {
      const nextWord = wordIdx + 1;
      if (nextWord >= sentence.words.length) {
        setPhase('fullSentence');
        setFlipped(false);
      } else {
        setWordIdx(nextWord);
        setFlipped(false);
      }
    } else if (phase === 'fullSentence') {
      const celeb = CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)];
      setCelebration(celeb);
      setPhase('celebration');
      setStars(s => s + 1);
      celebTimerRef.current = setTimeout(() => {
        setCelebration(null);
        const next = sentenceIdx + 1;
        if (next >= SENTENCES.length) {
          setPhase('end');
        } else {
          setSentenceIdx(next);
          setWordIdx(0);
          setFlipped(false);
          setPhase('word');
        }
      }, 2800);
    }
  }, [phase, wordIdx, sentence, sentenceIdx]);

  const handleNo = useCallback(() => {
    if (phase === 'word') {
      setFlipped(true); // show picture
    } else if (phase === 'fullSentence') {
      // restart sentence
      setWordIdx(0);
      setFlipped(false);
      setPhase('word');
    }
  }, [phase]);

  const handlePlayAgain = useCallback(() => {
    setSentenceIdx(0);
    setWordIdx(0);
    setFlipped(false);
    setPhase('word');
    setStars(0);
    setCelebration(null);
  }, []);

  useEffect(() => () => clearTimeout(celebTimerRef.current), []);

  if (phase === 'end') {
    return React.createElement('div', null,
      React.createElement(StarBackground),
      React.createElement('div', { className: 'end-screen' },
        React.createElement('div', { className: 'end-card' },
          React.createElement('div', { style: { fontSize: 72 } }, '🦄'),
          React.createElement('div', { className: 'end-title' }, 'You Did It!'),
          React.createElement('div', { className: 'end-subtitle' }, 'You read all the sentences!'),
          React.createElement('div', { className: 'end-stars' },
            Array.from({ length: Math.min(stars, 10) }, (_, i) =>
              React.createElement('span', { key: i }, '⭐')
            )
          ),
          React.createElement('div', { style: { color: '#E8C4F0', fontSize: 20, marginBottom: 8 } },
            stars + ' gold stars earned! 🌟'
          ),
          React.createElement('button', { className: 'btn-play-again', onClick: handlePlayAgain }, '✨ Play Again! ✨')
        )
      )
    );
  }

  return React.createElement('div', null,
    React.createElement(StarBackground),
    celebration && React.createElement(Confetti),
    celebration && React.createElement('div', { className: 'celebration' },
      React.createElement('div', { className: 'celebration-card' },
        React.createElement('div', { className: 'celebration-emoji' }, celebration.emoji),
        React.createElement('div', { className: 'celebration-title' }, celebration.title),
        React.createElement('div', { className: 'celebration-subtitle' }, celebration.subtitle),
        React.createElement('div', { style: { marginTop: 16, fontSize: 28 } },
          Array.from({ length: stars }, (_, i) => React.createElement('span', { key: i }, '⭐'))
        )
      )
    ),
    React.createElement('div', { className: 'game-container' },
      // Header
      React.createElement('div', { className: 'header' },
        React.createElement('div', { className: 'stars-display' },
          React.createElement('span', null, '⭐'),
          React.createElement('span', null, stars)
        ),
        React.createElement('div', { className: 'progress-text' },
          `Sentence ${sentenceIdx + 1} of ${SENTENCES.length}`
        ),
        React.createElement('div', { className: 'title-text' }, '👑 Reader')
      ),

      // Card area
      React.createElement('div', { className: 'card-area' },
        // Guide character
        React.createElement('div', { className: 'guide' }, GUIDES[guideIdx]),

        phase === 'word' && React.createElement(React.Fragment, null,
          // Word progress dots
          React.createElement('div', { className: 'word-dots' },
            sentence.words.map((_, i) =>
              React.createElement('div', {
                key: i,
                className: `word-dot ${i < wordIdx ? 'done' : i === wordIdx ? 'current' : ''}`
              })
            )
          ),

          // Flip card
          React.createElement('div', {
            className: `flip-card-wrapper ${flipped ? 'flipped' : ''}`,
            onClick: handleFlip
          },
            React.createElement('div', { className: 'flip-card-inner' },
              // Front: word
              React.createElement('div', { className: 'flip-card-front' },
                React.createElement(ColoredWord, { word: sentence.words[wordIdx] }),
                React.createElement('div', { className: 'tap-hint' }, 'tap for hint 👆')
              ),
              // Back: picture
              React.createElement('div', { className: 'flip-card-back' },
                React.createElement('div', { className: 'picture-hint' },
                  React.createElement('div', { className: 'hint-emoji' }, sentence.hints[wordIdx].emoji),
                  React.createElement('div', { className: 'hint-word' }, sentence.words[wordIdx]),
                  React.createElement('div', { className: 'hint-sound' }, '🔊 ' + sentence.hints[wordIdx].sound)
                )
              )
            )
          )
        ),

        phase === 'fullSentence' && React.createElement('div', { className: 'full-sentence-card' },
          React.createElement('div', { className: 'full-sentence-label' }, '✨ Read the sentence! ✨'),
          React.createElement('div', { className: 'full-sentence-text' },
            sentence.words.join(' ')
          )
        )
      ),

      // Buttons
      React.createElement('div', { className: 'buttons' },
        React.createElement('button', { className: 'btn btn-no', onClick: handleNo },
          React.createElement('span', { className: 'btn-icon' }, '🔄'),
          React.createElement('span', null, phase === 'word' ? 'Help me' : 'Try again')
        ),
        React.createElement('button', { className: 'btn btn-yes', onClick: handleYes },
          React.createElement('span', { className: 'btn-icon' }, '✨'),
          React.createElement('span', null, phase === 'word' ? 'I read it!' : 'I said it!')
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Game));
</script>
</body>
</html>
